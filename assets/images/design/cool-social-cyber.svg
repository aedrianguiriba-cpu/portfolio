<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Cyber Social Campaign</title>
  <desc id="desc">A cyber-themed social campaign mockup with dynamic cards and gradient lights.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f17"/>
      <stop offset="100%" stop-color="#221234"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ee7ff"/>
      <stop offset="100%" stop-color="#7d8cff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <text x="80" y="105" fill="#f6f8ff" font-family="Arial" font-size="44" font-weight="700">Cyber Campaign Set</text>
  <g transform="translate(90 150)">
    <rect width="300" height="530" rx="24" fill="#111a2b" stroke="#5ee7ff"/>
    <rect x="22" y="24" width="256" height="190" rx="14" fill="url(#card)"/>
    <text x="30" y="286" fill="#d7e2ff" font-family="Arial" font-size="30" font-weight="700">Launch Teaser</text>
    <line x1="30" y1="320" x2="260" y2="320" stroke="#5ee7ff" stroke-width="6"/>
  </g>
  <g transform="translate(450 150)">
    <rect width="300" height="530" rx="24" fill="#111a2b" stroke="#fc4f9a"/>
    <rect x="22" y="24" width="256" height="190" rx="14" fill="#fc4f9a"/>
    <text x="30" y="286" fill="#ffd3ea" font-family="Arial" font-size="30" font-weight="700">Feature Drop</text>
    <line x1="30" y1="320" x2="260" y2="320" stroke="#fc4f9a" stroke-width="6"/>
  </g>
  <g transform="translate(810 150)">
    <rect width="300" height="530" rx="24" fill="#111a2b" stroke="#f0a322"/>
    <rect x="22" y="24" width="256" height="190" rx="14" fill="#f0a322"/>
    <text x="30" y="286" fill="#ffe4b1" font-family="Arial" font-size="30" font-weight="700">Action Frame</text>
    <line x1="30" y1="320" x2="260" y2="320" stroke="#f0a322" stroke-width="6"/>
  </g>
</svg>
