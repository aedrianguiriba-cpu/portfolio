  <ellipse cx="1060" cy="280" rx="28" ry="60" fill="#b5ead7" fill-opacity="0.55"/>
  <ellipse cx="1010" cy="308" rx="50" ry="22" fill="#4a9e80" fill-opacity="0.38" transform="rotate(-28 1010 308)"/>
  <ellipse cx="1110" cy="308" rx="50" ry="22" fill="#4a9e80" fill-opacity="0.38" transform="rotate(28 1110 308)"/>
  <ellipse cx="1030" cy="258" rx="38" ry="18" fill="#b5ead7" fill-opacity="0.45" transform="rotate(-14 1030 258)"/>
  <ellipse cx="1090" cy="258" rx="38" ry="18" fill="#b5ead7" fill-opacity="0.45" transform="rotate(14 1090 258)"/>
  <circle cx="960" cy="220" r="10" fill="#ffd6a5" fill-opacity="0.6"/>
  <circle cx="1160" cy="210" r="8" fill="#ffd6a5" fill-opacity="0.6"/>
  <line x1="1060" y1="340" x2="1060" y2="395" stroke="#4a9e80" stroke-width="2.5" stroke-opacity="0.5"/>
  <text x="1060" y="415" fill="#4a9e80" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" letter-spacing="3" fill-opacity="0.7">BOTANICAL</text>

  <!-- ── ABSTRACT SHAPES ── -->
  <rect x="600" y="468" width="280" height="260" rx="20" fill="#1a1018"/>
  <circle cx="700" cy="568" r="62" fill="#ffb3c6" fill-opacity="0.28"/>
  <circle cx="760" cy="628" r="50" fill="#ffd6a5" fill-opacity="0.3"/>
  <polygon points="730,528 790,638 670,638" fill="#ff8fa8" fill-opacity="0.22"/>
  <circle cx="732" cy="584" r="22" fill="#ffb3c6" fill-opacity="0.45"/>
  <text x="740" y="700" fill="#6e5080" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" letter-spacing="3">ABSTRACT</text>

  <!-- ── COLOUR PALETTE ── -->
  <rect x="920" y="468" width="280" height="260" rx="20" fill="#1f1630"/>
  <text x="960" y="510" fill="#6e5080" font-family="Arial,sans-serif" font-size="13" letter-spacing="3">PALETTE</text>
  <circle cx="974" cy="568" r="28" fill="#c9a0f5"/>
  <circle cx="1046" cy="568" r="28" fill="#ffb3c6"/>
  <circle cx="1118" cy="568" r="28" fill="#ffd6a5"/>
  <circle cx="974" cy="638" r="28" fill="#b5ead7"/>
  <circle cx="1046" cy="638" r="28" fill="#a8d8ea"/>
  <circle cx="1118" cy="638" r="28" fill="#ff8fa8"/>
  <text x="974" y="693" fill="#3e2848" font-family="Arial,sans-serif" font-size="11" text-anchor="middle">Lavender</text>
  <text x="1046" y="693" fill="#3e2848" font-family="Arial,sans-serif" font-size="11" text-anchor="middle">Rose</text>
  <text x="1118" y="693" fill="#3e2848" font-family="Arial,sans-serif" font-size="11" text-anchor="middle">Peach</text>

  <!-- Footer -->
  <line x1="80" y1="770" x2="1120" y2="770" stroke="#2e1e42" stroke-width="1"/>
  <text x="80" y="800" fill="#6e5080" font-family="Arial,sans-serif" font-size="14" letter-spacing="3">VECTOR + DIGITAL ILLUSTRATION</text>
  <text x="1120" y="800" fill="#c9a0f5" font-family="Georgia,serif" font-size="18" font-weight="700" text-anchor="end">AG Studio</text>
</svg>
