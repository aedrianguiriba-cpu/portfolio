<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Illustrations portfolio board">
  <defs>
    <radialGradient id="gIll" cx="30%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#c9a0f5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c9a0f5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="900" fill="#160f1e"/>
  <rect width="1200" height="900" fill="url(#gIll)"/>

  <!-- Title bar -->
  <text x="80" y="72" fill="#c9a0f5" font-family="Georgia,serif" font-size="40" font-weight="700">Illustrations</text>
  <text x="80" y="106" fill="#6e5080" font-family="Arial,sans-serif" font-size="16" letter-spacing="4">VECTOR + DIGITAL ART PORTFOLIO</text>
  <line x1="80" y1="124" x2="1120" y2="124" stroke="#2e1e42" stroke-width="1.5"/>

  <!-- ── HERO: Figure illustration ── -->
  <rect x="80" y="148" width="480" height="580" rx="20" fill="#1f1630"/>
  <circle cx="320" cy="380" r="180" fill="#c9a0f5" fill-opacity="0.06"/>
  <!-- Head -->
  <circle cx="320" cy="252" r="72" fill="none" stroke="#c9a0f5" stroke-width="2.5"/>
  <circle cx="320" cy="252" r="46" fill="#c9a0f5" fill-opacity="0.12"/>
  <!-- Body -->
  <path d="M 278 322 Q 230 420 250 530 Q 270 600 320 620 Q 370 600 390 530 Q 410 420 362 322 Z"
        fill="#c9a0f5" fill-opacity="0.14" stroke="#c9a0f5" stroke-width="1.5"/>
  <!-- Left arm -->
  <path d="M 262 380 Q 190 370 160 430 Q 140 480 175 520"
        fill="none" stroke="#ffb3c6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M 378 380 Q 450 370 480 430 Q 500 480 465 520"
        fill="none" stroke="#ffb3c6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Decorative botanical -->
  <ellipse cx="165" cy="460" rx="32" ry="56" fill="#b5ead7" fill-opacity="0.45" transform="rotate(-22 165 460)"/>
  <ellipse cx="475" cy="460" rx="32" ry="56" fill="#b5ead7" fill-opacity="0.45" transform="rotate(22 475 460)"/>
  <circle cx="152" cy="402" r="16" fill="#ffd6a5" fill-opacity="0.6"/>
  <circle cx="488" cy="402" r="16" fill="#ffd6a5" fill-opacity="0.6"/>
  <!-- Stars -->
  <circle cx="210" cy="200" r="6" fill="#ffd6a5"/>
  <circle cx="430" cy="188" r="5" fill="#ffb3c6"/>
  <circle cx="120" cy="570" r="7" fill="#c9a0f5" fill-opacity="0.7"/>
  <circle cx="520" cy="550" r="6" fill="#a8d8ea" fill-opacity="0.7"/>
  <!-- Label -->
  <text x="320" y="692" fill="#6e5080" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" letter-spacing="3">CHARACTER DESIGN</text>

  <!-- ── GEOMETRIC PATTERN ── -->
  <rect x="600" y="148" width="280" height="280" rx="20" fill="#1f1630"/>
  <circle cx="740" cy="288" r="90" fill="none" stroke="#c9a0f5" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="740" cy="288" r="62" fill="none" stroke="#ffb3c6" stroke-width="1.5" stroke-opacity="0.6"/>
  <circle cx="740" cy="288" r="36" fill="none" stroke="#ffd6a5" stroke-width="1.5" stroke-opacity="0.7"/>
  <circle cx="740" cy="288" r="12" fill="#c9a0f5" fill-opacity="0.5"/>
  <line x1="740" y1="198" x2="740" y2="148" stroke="#c9a0f5" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="740" y1="378" x2="740" y2="428" stroke="#c9a0f5" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="650" y1="288" x2="600" y2="288" stroke="#c9a0f5" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="830" y1="288" x2="880" y2="288" stroke="#c9a0f5" stroke-width="1" stroke-opacity="0.4"/>
