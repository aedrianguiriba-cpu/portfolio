<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Editorial Grid System</title>
  <desc id="desc">Editorial page wireframe showing grid columns and layout hierarchy.</desc>
  <rect width="1200" height="800" fill="#111827"/>
  <rect x="80" y="80" width="1040" height="640" rx="22" fill="#f6f1e7"/>
  <text x="130" y="150" fill="#20242f" font-family="Arial" font-size="40" font-weight="700">Grid System</text>
  <g stroke="#b8af9f" stroke-width="2">
    <line x1="180" y1="190" x2="180" y2="660"/>
    <line x1="280" y1="190" x2="280" y2="660"/>
    <line x1="380" y1="190" x2="380" y2="660"/>
    <line x1="480" y1="190" x2="480" y2="660"/>
    <line x1="580" y1="190" x2="580" y2="660"/>
    <line x1="680" y1="190" x2="680" y2="660"/>
    <line x1="780" y1="190" x2="780" y2="660"/>
    <line x1="880" y1="190" x2="880" y2="660"/>
    <line x1="980" y1="190" x2="980" y2="660"/>
  </g>
  <rect x="140" y="220" width="420" height="180" rx="12" fill="#0f4f74"/>
  <rect x="600" y="220" width="460" height="80" rx="10" fill="#f0a322"/>
  <rect x="600" y="320" width="460" height="80" rx="10" fill="#c74735"/>
</svg>
