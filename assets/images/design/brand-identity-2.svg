<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Brand Identity Moodboard</title>
  <desc id="desc">A brand identity moodboard with logo sketches, typography, and color swatches.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102b46"/>
      <stop offset="100%" stop-color="#1f5c92"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect x="90" y="90" width="1020" height="620" rx="24" fill="#f6f1e7"/>
  <rect x="140" y="150" width="290" height="220" rx="16" fill="#0f4f74"/>
  <text x="170" y="210" fill="#f6f1e7" font-family="Arial" font-size="40" font-weight="700">A G</text>
  <text x="170" y="260" fill="#f6f1e7" font-family="Arial" font-size="24">Primary Mark</text>
  <rect x="470" y="150" width="590" height="220" rx="16" fill="#ffffff"/>
  <text x="510" y="215" fill="#20242f" font-family="Arial" font-size="42" font-weight="700">Brand Direction</text>
  <text x="510" y="265" fill="#4d5568" font-family="Arial" font-size="24">Confident. Warm. Structured.</text>
  <g transform="translate(140 430)">
    <rect width="180" height="160" rx="14" fill="#f0a322"/>
    <rect x="200" width="180" height="160" rx="14" fill="#c74735"/>
    <rect x="400" width="180" height="160" rx="14" fill="#0f4f74"/>
    <rect x="600" width="180" height="160" rx="14" fill="#20242f"/>
    <text x="20" y="95" fill="#1a1a1a" font-family="Arial" font-size="20">Accent</text>
    <text x="220" y="95" fill="#fff" font-family="Arial" font-size="20">Tomato</text>
    <text x="420" y="95" fill="#fff" font-family="Arial" font-size="20">Teal</text>
    <text x="620" y="95" fill="#fff" font-family="Arial" font-size="20">Ink</text>
  </g>
</svg>
