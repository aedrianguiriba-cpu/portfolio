<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Neon Brand Identity</title>
  <desc id="desc">A futuristic neon brand board with glowing logo marks and typography strips.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#04070d"/>
      <stop offset="100%" stop-color="#0d1c34"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3df6ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3df6ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <circle cx="280" cy="220" r="170" fill="url(#glow)"/>
  <circle cx="930" cy="620" r="190" fill="url(#glow)"/>
  <rect x="110" y="95" width="980" height="610" rx="30" fill="#0b1424" stroke="#3df6ff" stroke-opacity="0.4"/>
  <rect x="170" y="155" width="300" height="250" rx="20" fill="#121f35" stroke="#63ffd8"/>
  <text x="225" y="285" fill="#63ffd8" font-family="Arial" font-size="88" font-weight="700">AG</text>
  <rect x="520" y="155" width="500" height="90" rx="12" fill="#111b2e" stroke="#3df6ff"/>
  <text x="560" y="214" fill="#3df6ff" font-family="Arial" font-size="40" font-weight="700">Neon Identity System</text>
  <rect x="520" y="275" width="500" height="130" rx="16" fill="#111b2e" stroke="#7d8cff"/>
  <text x="560" y="350" fill="#c8d1ff" font-family="Arial" font-size="30">High contrast, futuristic, clean.</text>
  <g transform="translate(170 455)">
    <rect width="190" height="170" rx="14" fill="#3df6ff"/>
    <rect x="210" width="190" height="170" rx="14" fill="#7d8cff"/>
    <rect x="420" width="190" height="170" rx="14" fill="#fc4f9a"/>
    <rect x="630" width="190" height="170" rx="14" fill="#131a2b" stroke="#c8d1ff"/>
  </g>
</svg>
