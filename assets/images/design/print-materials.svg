  <rect x="1060" y="416" width="320" height="36" rx="12" fill="#1e2d52" fill-opacity="0.08"/>
  <rect x="1060" y="416" width="320" height="5" rx="4" fill="#e8b86d"/>
  <!-- Logo area -->
  <circle cx="1100" cy="478" r="22" fill="none" stroke="#1e2d52" stroke-width="1.5"/>
  <!-- Address lines -->
  <rect x="1136" y="466" width="120" height="10" rx="4" fill="#d0c8b8"/>
  <rect x="1136" y="484" width="96" height="8" rx="4" fill="#e0d8c8"/>
  <!-- Body text lines -->
  <rect x="1076" y="516" width="272" height="8" rx="4" fill="#e0d8c8"/>
  <rect x="1076" y="532" width="250" height="8" rx="4" fill="#e0d8c8"/>
  <rect x="1076" y="548" width="264" height="8" rx="4" fill="#e0d8c8"/>
  <rect x="1076" y="564" width="240" height="8" rx="4" fill="#e0d8c8"/>
  <rect x="1076" y="580" width="256" height="8" rx="4" fill="#e0d8c8"/>
  <rect x="1076" y="596" width="228" height="8" rx="4" fill="#e0d8c8"/>
  <rect x="1076" y="620" width="272" height="8" rx="4" fill="#e0d8c8"/>
  <rect x="1076" y="636" width="244" height="8" rx="4" fill="#e0d8c8"/>
  <!-- Footer line -->
  <line x1="1076" y1="666" x2="1364" y2="666" stroke="#d0c8b8" stroke-width="1"/>
  <rect x="1076" y="676" width="180" height="7" rx="3" fill="#e8e0d0"/>
  <text x="1220" y="692" fill="#8a7860" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" letter-spacing="2">LETTERHEAD</text>

  <!-- Footer -->
  <line x1="80" y1="810" x2="1120" y2="810" stroke="#d0c8b8" stroke-width="1"/>
  <text x="80" y="842" fill="#8a8070" font-family="Arial,sans-serif" font-size="14" letter-spacing="3">PRINT MATERIALS — POSTERS, BROCHURES, COLLATERAL</text>
  <text x="1120" y="842" fill="#1e2d52" font-family="Georgia,serif" font-size="18" font-weight="700" text-anchor="end">AG Studio</text>
</svg>
